<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dubtube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 340px;
      min-height: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 16px;
      background: #fff;
      color: #1a1a1a;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    h1 { font-size: 15px; font-weight: 600; }
    .version { font-size: 11px; color: #999; }

    .status {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    .status.ok { background: #e8f5e9; color: #2e7d32; }
    .status.warn { background: #fff3e0; color: #e65100; }
    .status.active { background: #e3f2fd; color: #1565c0; }

    .mode-section { margin-bottom: 12px; }
    .mode-label {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500;
    }
    .mode-label input { display: none; }
    .toggle-track {
      position: relative; width: 36px; height: 20px;
      background: #ccc; border-radius: 10px; transition: background 0.2s;
    }
    .toggle-thumb {
      position: absolute; top: 2px; left: 2px; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; transition: left 0.2s;
    }
    .mode-label input:checked + .toggle-track { background: #4caf50; }
    .mode-label input:checked + .toggle-track .toggle-thumb { left: 18px; }
    .mode-desc { font-size: 11px; color: #999; margin-top: 4px; }

    h2 { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 8px; }

    .empty {
      font-size: 12px;
      color: #999;
      text-align: center;
      padding: 16px 0;
    }

    .job-list { list-style: none; }
    .job-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 12px;
    }
    .job-item:last-child { border-bottom: none; }

    .job-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .badge-pending { background: #f5f5f5; color: #757575; }
    .badge-running { background: #e3f2fd; color: #1565c0; }
    .badge-done { background: #e8f5e9; color: #2e7d32; }
    .badge-error { background: #ffebee; color: #c62828; }

    .job-info { flex: 1; min-width: 0; }
    .job-video { font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .job-lang { color: #888; }
    .job-time { color: #bbb; font-size: 10px; flex-shrink: 0; }
  </style>
</head>
<body>
  <header>
    <h1>Dubtube</h1>
    <span id="version" class="version"></span>
  </header>
  <div id="status" class="status warn">로딩 중…</div>
  <div class="mode-section">
    <label class="mode-label">
      <span>자동 게시</span>
      <input type="checkbox" id="mode-toggle" />
      <span class="toggle-track"><span class="toggle-thumb"></span></span>
    </label>
    <p class="mode-desc" id="mode-desc">도움 모드: 파일 추가까지만 자동으로 진행</p>
  </div>

  <h2>최근 업로드</h2>
  <div id="jobs-container">
    <p class="empty">로딩 중…</p>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
