name: Process background jobs

on:
  schedule:
    # GitHub Actions schedules can be delayed around the top of the hour.
    # Keep a 5-minute cadence.
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: background-cron
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate config
        run: |
          set -euo pipefail
          if [ -z "${{ vars.PROD_BASE_URL }}" ]; then
            echo "::error::Missing repo variable PROD_BASE_URL (Settings → Secrets and variables → Actions → Variables)"
            exit 1
          fi
          if [ -z "${{ secrets.CRON_SECRET }}" ]; then
            echo "::error::Missing repo secret CRON_SECRET"
            exit 1
          fi

      - name: Process dubbing jobs and upload queue
        env:
          BASE_URL: ${{ vars.PROD_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          node <<'NODE'
          const endpoints = ['/api/cron/process-dubbing-jobs', '/api/cron/process-uploads']
          const baseUrl = process.env.BASE_URL.replace(/\/+$/, '')
          const cronSecret = process.env.CRON_SECRET

          async function callEndpoint(path) {
            const url = `${baseUrl}${path}`
            console.log(`Calling ${url}`)

            for (let attempt = 1; attempt <= 3; attempt += 1) {
              const controller = new AbortController()
              const timeout = setTimeout(() => controller.abort(), 280_000)

              try {
                const res = await fetch(url, {
                  method: 'POST',
                  headers: { Authorization: `Bearer ${cronSecret}` },
                  signal: controller.signal,
                })
                const body = await res.text()
                console.log(`HTTP ${res.status}`)
                console.log(body)
                if (res.ok) return
                if (attempt === 3) process.exit(1)
              } catch (err) {
                console.error(err)
                if (attempt === 3) process.exit(1)
              } finally {
                clearTimeout(timeout)
              }

              await new Promise((resolve) => setTimeout(resolve, 10_000))
            }
          }

          async function main() {
            for (const endpoint of endpoints) {
              await callEndpoint(endpoint)
            }
          }

          main().catch((err) => {
            console.error(err)
            process.exit(1)
          })
          NODE
