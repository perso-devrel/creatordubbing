name: Quality

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  app:
    name: App typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: test-google-client-id
      NEXT_PUBLIC_PERSO_FILE_BASE_URL: https://perso.ai
      PERSO_API_KEY: test-perso-key
      PERSO_API_BASE_URL: https://api.perso.ai
      TURSO_URL: http://localhost
      TURSO_AUTH_TOKEN: test-turso-token
      GOOGLE_CLIENT_SECRET: test-google-client-secret
      SESSION_SECRET: test-session-secret
      TOKEN_ENCRYPTION_KEY: test-token-encryption-key
      CRON_SECRET: test-cron-secret
      TOSS_SECRET_KEY: test-toss-secret
      TOSS_API_BASE_URL: https://api.tosspayments.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  extension:
    name: Extension typecheck, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: extension

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
