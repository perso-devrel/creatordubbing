version: 2
updates:
  # Application dependencies (npm)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Seoul"
    target-branch: "develop"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
          - "major"
    ignore:
      # Major updates handled as individual PRs, never grouped
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"

  # Major-version updates (npm) — opened as separate, non-grouped PRs
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Seoul"
    target-branch: "develop"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "major-update"
    commit-message:
      prefix: "chore(deps-major)"
      include: "scope"
    allow:
      - dependency-type: "direct"
    # Only major updates here; grouped config above ignores majors
    versioning-strategy: "increase"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Seoul"
    target-branch: "develop"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "security"
      - "github-actions"
    commit-message:
      prefix: "chore(actions)"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      actions-security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
          - "major"
